<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
  <!-- Tailwind + Daisy CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Titlle -->\
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
  <title>Home</title>
</head>

<body>

  <header>
    <div class="navbar bg-base-100 shadow-sm px-10">
      <div class="flex items-center flex-1">
        <img class="w-[40px]" src="./assets/github-logo.png" alt="">
        <a class="btn btn-ghost text-xl font-bold">ALL ISSUES</a>
      </div>

      <!-- Search Feld -->
      <div class="flex gap-2">
        <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
        <button class="btn btn-primary">Search</button>
      </div>
    </div>
  </header>
  <!-- Select all Section -->
  <section class="  w-11/12 mx-auto">
    <div class="mt-20 border border-gray-100 p-5 shadow-sm">
      <button class="btn btn-primary">All</button>
      <button class="btn ">Open</button>
      <button class="btn ">Close</button>
    </div>
  </section>

  <section class="w-11/12 mx-auto  mt-10">
    <div class="border border-gray-100 p-5 shadow flex justify-between">
      <div class="flex items-center">
        <div class="mr-5">
          <img class="w-[40px]" src="./assets/Aperture.png" alt="">
        </div>
        <div class="">
          <h3 class="text-[20px] font-semibold"><span >0</span> Issues</h3>
          <p class="text-gray-400">Track and manage your project issues</p>
        </div>

      </div>
      <div class="flex gap-5 items-center">
        <p class="text-gray-400">Open</p>
        <p class="text-gray-400">Close</p>
      </div>
    </div>

  </section>




</body>

</html>
